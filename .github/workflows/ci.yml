name: CI — Test on Pull Request

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - service-registry
          - api-gateway
          - question-service
          - quiz-service
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ matrix.service }}-${{ hashFiles(format('microservice-app/{0}/build.gradle', matrix.service), format('microservice-app/{0}/settings.gradle', matrix.service)) }}
          restore-keys: gradle-${{ matrix.service }}-

      - name: Make gradlew executable
        run: chmod +x microservice-app/${{ matrix.service }}/gradlew

      - name: Run tests
        working-directory: microservice-app/${{ matrix.service }}
        run: ./gradlew test --no-daemon
