spring.application.name=quiz-service

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

server.port=8090

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/quiz-db
spring.datasource.username=postgres
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=2000

resilience4j.circuitbreaker.instances.questionService.registerHealthIndicator=true

resilience4j.circuitbreaker.instances.questionService.slidingWindowSize=20
resilience4j.circuitbreaker.instances.questionService.minimumNumberOfCalls=10
resilience4j.circuitbreaker.instances.questionService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.questionService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.questionService.permittedNumberOfCallsInHalfOpenState=5

resilience4j.retry.instances.questionService.max-attempts=2
resilience4j.retry.instances.questionService.wait-duration=500ms
resilience4j.retry.instances.questionService.enable-exponential-backoff=true
resilience4j.retry.instances.questionService.exponential-backoff-multiplier=2
resilience4j.retry.instances.questionService.retry-exceptions[0]=org.springframework.web.client.ResourceAccessException
resilience4j.retry.instances.questionService.retry-exceptions[1]=java.io.IOException
resilience4j.retry.instances.questionService.retry-exceptions[2]=java.util.concurrent.TimeoutException

resilience4j.timelimiter.instances.questionService.timeout-duration=2s
resilience4j.timelimiter.instances.questionService.cancel-running-future=true

resilience4j.bulkhead.instances.questionService.maxConcurrentCalls=20
resilience4j.bulkhead.instances.questionService.maxWaitDuration=0

logging.level.io.github.resilience4j=DEBUG